<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Name Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --pink:#f9b8c8;--pink-deep:#e8849a;--pink-pale:#fde8ee;--pink-mid:#f4a0b8;
    --blue:#a8d4f5;--blue-deep:#6aaee0;--blue-pale:#ddf0ff;--blue-mid:#8ec4ef;
    --gold:#d4a853;--text-dark:#3a3250;
    /* Theme-controlled colors (overridden by JS from settings) */
    --theme-page-bg:#C5D1B8;
    --theme-card-bg:#A8B898;
    --theme-border:rgba(156,175,136,0.3);
    --neutral:var(--theme-page-bg);--neutral-border:var(--theme-border);
    --name-font:clamp(1.35rem,2.2vw,1.85rem);
    --count-font:clamp(1.6rem,2.6vw,2.2rem);
    --card-pad-v:1rem;--card-gap:0.85rem;
    --ticker-duration:32s;
  }
  html,body{width:100%;height:100%;background:var(--theme-page-bg);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
  @media(min-width:900px){body{overflow:hidden;}}

  #particles,#confetti-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
  #confetti-canvas{z-index:100;}

  .page{position:relative;z-index:5;display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;width:100%;max-width:100vw;overflow:hidden;}
  .page > * { min-width:0; max-width:100vw; width:100%; }
  @media(min-width:900px){.page{height:100vh;}}

  /* ════════════════════════════════════════════════════
     HEADER
     Strategy: title is centered via text-align.
     QR is absolute right so it doesn't shift the title.
     Side padding on header-text creates space for the QR.
  ════════════════════════════════════════════════════ */
  .header-band{
    background:var(--theme-page-bg);
    border-bottom:1.5px solid var(--theme-border);
    box-shadow:0 2px 24px rgba(0,0,0,0.06);
    position:relative;
    padding:1.2rem clamp(1rem,2vw,2rem) 1rem;
    text-align:center;
  }

  /* Eyebrow — on large screens: one line. On small screens: wraps gracefully.
     Each phrase is nowrap so it never breaks mid-phrase. */
  .header-eyebrow{
    font-size:0.65rem;font-weight:400;letter-spacing:0.3em;text-transform:uppercase;
    color:var(--text-dark);opacity:0.38;margin-bottom:0.35rem;
    line-height:1.7;
  }
  .header-eyebrow .phrase{
    white-space:nowrap;display:inline;
  }

  /* Push text away from QR on both sides to keep title visually centered */
  @media(min-width:560px){
    .header-band{padding-left:clamp(90px,11vw,140px);padding-right:clamp(90px,11vw,140px);}
  }

  .header-title{
    font-family:'Playfair Display',serif;
    font-size:clamp(1.7rem,5vw,4.6rem);
    font-weight:900;color:var(--text-dark);
    line-height:1.05;letter-spacing:-0.02em;
  }
  .header-title .accent-pink{color:var(--pink-deep);}
  .header-title .accent-blue{color:var(--blue-deep);}

  .header-sub{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(0.82rem,1.3vw,1.15rem);
    font-weight:300;font-style:italic;
    color:var(--text-dark);opacity:0.38;margin-top:0.2rem;
  }

  /* QR — absolutely positioned, vertically centered in header */
  .header-qr{
    position:absolute;
    right:clamp(0.6rem,1.5vw,1.5rem);
    top:50%;transform:translateY(-50%);
    display:block;text-decoration:none;
  }
  .qr-image{
    width:clamp(68px,9vw,110px);height:clamp(68px,9vw,110px);
    border-radius:10px;background:var(--theme-card-bg);padding:5px;
    border:1.5px solid var(--theme-border);
    box-shadow:0 3px 16px rgba(0,0,0,0.07);
    display:block;transition:transform 0.2s,box-shadow 0.2s;
  }
  .header-qr:hover .qr-image{transform:scale(1.06);box-shadow:0 6px 24px rgba(0,0,0,0.1);}

  /* On small screens: show QR but smaller, keep symmetric padding so title stays centered */
  @media(max-width:559px){
    .header-qr{right:0.5rem;}
    .qr-image{width:52px;height:52px;padding:3px;border-radius:8px;}
    .header-band{padding-left:60px;padding-right:60px;}
  }

  /* ── GENDER POLL ── */
  .poll-container{max-width:480px;margin:1.2rem auto 0;animation:fade-in 0.6s ease;}
  .poll-title{font-size:0.75rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dark);opacity:0.6;margin-bottom:0.6rem;}
  .poll-bar-wrapper{display:flex;height:28px;border-radius:20px;overflow:hidden;background:rgba(255,255,255,0.4);border:1.5px solid var(--theme-border);box-shadow:inset 0 2px 6px rgba(0,0,0,0.04),0 2px 12px rgba(0,0,0,0.03);position:relative;}
  .poll-side{display:flex;align-items:center;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);overflow:hidden;white-space:nowrap;}
  .poll-girl{background:linear-gradient(to right,var(--pink-mid),var(--pink-deep));justify-content:flex-start;}
  .poll-girl .poll-label{padding-left:0.8rem;}
  .poll-boy{background:linear-gradient(to left,var(--blue-mid),var(--blue-deep));justify-content:flex-end;}
  .poll-boy .poll-label{padding-right:0.8rem;}
  .poll-label{color:white;font-weight:800;font-size:0.8rem;text-shadow:0 1px 2px rgba(0,0,0,0.15);}
  .poll-marker{position:absolute;left:50%;top:-2px;bottom:-2px;width:3px;background:var(--gold);transform:translateX(-50%);border-radius:2px;box-shadow:0 0 8px rgba(212,168,83,0.6);z-index:2;}


  /* ════════════════════════════════════════════════════
     MIDDLE — split
  ════════════════════════════════════════════════════ */
  .middle{display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden;min-height:0;}
  @media(max-width:600px){.middle{grid-template-columns:1fr;}}

  .half-girl{background:var(--pink-pale);display:flex;flex-direction:column;min-height:0;}
  .half-boy{background:var(--blue-pale);display:flex;flex-direction:column;min-height:0;}

  .middle-divider{position:absolute;left:50%;top:0;bottom:0;width:3px;transform:translateX(-50%);background:linear-gradient(to bottom,transparent 0%,var(--gold) 8%,var(--gold) 92%,transparent 100%);z-index:10;pointer-events:none;}
  .middle-divider::before,.middle-divider::after{content:'◆';position:absolute;left:50%;transform:translateX(-50%);color:var(--gold);font-size:0.85rem;line-height:1;}
  .middle-divider::before{top:5%;}.middle-divider::after{bottom:5%;}
  @media(max-width:600px){.middle-divider{display:none;}}

  .col-header{display:flex;align-items:center;justify-content:center;padding:0.8rem 1.2rem 0.5rem;flex-shrink:0;gap:0.6rem;position:relative;}
  .half-girl .col-header{justify-content:center;}
  .half-boy .col-header{justify-content:center;}
  .col-label-icon{font-size:clamp(1rem,1.7vw,1.5rem);flex-shrink:0;}
  .col-label-text{font-family:'Playfair Display',serif;font-size:clamp(1rem,2.1vw,1.9rem);font-weight:700;font-style:italic;white-space:nowrap;}
  .half-girl .col-label-text{color:var(--pink-deep);}
  .half-boy .col-label-text{color:var(--blue-deep);}

  .col-vote-total{display:flex;flex-direction:column;align-items:center;gap:0.05rem;flex-shrink:0;position:absolute;top:50%;transform:translateY(-50%);}
  .col-vote-total .total-num{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,2vw,1.8rem);font-weight:700;line-height:1;}
  .col-vote-total .total-label{font-size:clamp(0.48rem,0.6vw,0.58rem);font-weight:400;letter-spacing:0.14em;text-transform:uppercase;opacity:0.42;color:var(--text-dark);font-family:'DM Sans',sans-serif;}
  .half-girl .col-vote-total{right:1.2rem;color:var(--pink-deep);}
  .half-boy .col-vote-total{left:1.2rem;color:var(--blue-deep);}
  @media(max-width:600px){
    .half-boy .col-vote-total{left:auto;right:1.2rem;}
  }

  .col{flex:1;padding:0.2rem clamp(0.7rem,2.4vw,2.2rem) 1rem;display:flex;flex-direction:column;gap:var(--card-gap);overflow:hidden;min-height:0;}
  @media(max-width:899px){.col{overflow:visible;min-height:unset;padding-bottom:0.8rem;}}

  /* Name card */
  .name-card{display:flex;align-items:center;gap:clamp(0.6rem,1.1vw,1rem);padding:var(--card-pad-v) clamp(0.7rem,1.3vw,1.3rem);border-radius:clamp(10px,1.4vw,18px);position:relative;overflow:hidden;opacity:0;transform:translateY(22px);transition:opacity 0.45s ease,transform 0.45s ease;will-change:transform,opacity;flex-shrink:0;}
  .name-card.visible{opacity:1;transform:translateY(0);}
  .name-card.girl{background:linear-gradient(135deg,rgba(255,255,255,0.88),rgba(249,184,200,0.32));border:1.5px solid rgba(232,132,154,0.22);box-shadow:0 4px 20px rgba(232,132,154,0.1),0 1px 4px rgba(0,0,0,0.05);}
  .name-card.boy{background:linear-gradient(135deg,rgba(255,255,255,0.88),rgba(168,212,245,0.32));border:1.5px solid rgba(106,174,224,0.22);box-shadow:0 4px 20px rgba(106,174,224,0.1),0 1px 4px rgba(0,0,0,0.05);}
  .name-card.rank-1::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.42),transparent);animation:shimmer 3s ease-in-out infinite;pointer-events:none;}
  @keyframes shimmer{0%{transform:translateX(-100%)}60%{transform:translateX(100%)}100%{transform:translateX(100%)}}
  .rank-badge{font-family:'Playfair Display',serif;font-weight:900;width:clamp(1.6rem,2.2vw,2.3rem);height:clamp(1.6rem,2.2vw,2.3rem);display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;font-size:clamp(0.7rem,0.92vw,0.95rem);}
  .name-card.rank-1 .rank-badge{background:linear-gradient(135deg,#f7e06b,#d4a853);color:#5a3e00;animation:crown-bob 2s ease-in-out infinite;}
  .name-card.rank-2 .rank-badge{background:linear-gradient(135deg,#e8e8e8,#b0b0b0);color:#3a3a3a;}
  .name-card.rank-3 .rank-badge{background:linear-gradient(135deg,#f5c89a,#c87941);color:#5a2e00;}
  .name-card:not(.rank-1):not(.rank-2):not(.rank-3) .rank-badge{background:rgba(255,255,255,0.5);color:var(--text-dark);opacity:0.45;}
  @keyframes crown-bob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-3px) rotate(5deg)}}
  .name-text{flex:1;font-family:'Playfair Display',serif;font-size:var(--name-font);font-weight:700;color:var(--text-dark);letter-spacing:0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .vote-section{display:flex;flex-direction:column;align-items:flex-end;gap:0.15rem;flex-shrink:0;}
  .vote-count{font-family:'Playfair Display',serif;font-size:var(--count-font);font-weight:900;line-height:1;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),color 0.3s;}
  .name-card.girl .vote-count{color:var(--pink-deep);}
  .name-card.boy .vote-count{color:var(--blue-deep);}
  .vote-count.pop{transform:scale(1.4);color:var(--gold)!important;}
  .vote-label{font-size:clamp(0.46rem,0.6vw,0.58rem);font-weight:400;letter-spacing:0.14em;text-transform:uppercase;opacity:0.42;color:var(--text-dark);}
  .vote-bar-track{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 18px 18px;background:rgba(0,0,0,0.05);overflow:hidden;}
  .vote-bar-fill{height:100%;border-radius:0 0 18px 18px;transition:width 0.8s cubic-bezier(0.25,1,0.5,1);}
  .name-card.girl .vote-bar-fill{background:linear-gradient(to right,var(--pink-mid),var(--pink-deep));}
  .name-card.boy .vote-bar-fill{background:linear-gradient(to right,var(--blue-mid),var(--blue-deep));}
  .empty-state{text-align:center;opacity:0.28;padding:2rem 1rem;}
  .empty-state-icon{font-size:clamp(1.6rem,2.8vw,2.4rem);margin-bottom:0.4rem;}
  .empty-state-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.88rem,1.3vw,1.15rem);color:var(--text-dark);}

  /* ════════════════════════════════════════════════════
     FOOTER — ticker only
     Hidden on small screens to keep layout clean
  ════════════════════════════════════════════════════ */
  .footer-band{
    background:var(--theme-page-bg);border-top:1.5px solid var(--theme-border);
    box-shadow:0 -2px 20px rgba(0,0,0,0.04);
    display:flex;align-items:center;
    padding:0.55rem clamp(1rem,2.5vw,2.5rem);gap:1rem;min-height:0;
  }

  /* Hide entire footer on mobile — ticker adds no value on a small screen */
  @media(max-width:700px){.footer-band{display:none;}}

  .ticker-label{font-size:0.6rem;font-weight:500;letter-spacing:0.24em;text-transform:uppercase;color:var(--text-dark);opacity:0.3;white-space:nowrap;flex-shrink:0;}
  .ticker-wrap{flex:1;min-width:0;overflow:hidden;}
  .ticker-inner{display:inline-flex;white-space:nowrap;will-change:transform;}
  .ticker-item{font-size:clamp(0.84rem,1.05vw,0.98rem);font-weight:500;color:var(--text-dark);opacity:0.62;display:inline-flex;align-items:center;gap:0.35rem;flex-shrink:0;}
  .ticker-item .t-voter{font-weight:700;}
  .ticker-item .t-name{font-family:'Playfair Display',serif;font-style:italic;}
  @keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  .toast{position:fixed;bottom:4rem;left:50%;transform:translateX(-50%) translateY(3rem);background:white;border-radius:50px;padding:0.65rem 1.7rem;font-size:0.88rem;font-weight:600;color:var(--text-dark);box-shadow:0 8px 32px rgba(0,0,0,0.12);z-index:200;opacity:0;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.4s ease;pointer-events:none;white-space:nowrap;border:1px solid var(--theme-border);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="page">

  <!-- HEADER: centered title, QR absolute right -->
  <header class="header-band">
    <div class="header-eyebrow"><span class="phrase">SCAN QR CODE</span> &nbsp;·&nbsp; <span class="phrase">GUESS BABY'S GENDER</span> &nbsp;·&nbsp; <span class="phrase">SUGGEST A NAME</span> &nbsp;·&nbsp; <span class="phrase">CAST YOUR VOTES</span></div>
    <h1 class="header-title"><span style="background: linear-gradient(to right, var(--pink) 10%, var(--pink) 38%, var(--blue) 62%, var(--blue) 90%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; color: transparent;">Baby Ballot Box</span></h1>
    <p class="header-sub">Every vote counts — let the best name win ✨</p>
    
    <!-- GENDER POLL -->
    <div class="poll-container">
      <div class="poll-title">Prediction Poll</div>
      <div class="poll-bar-wrapper">
        <div class="poll-side poll-girl" style="width: 50%">
          <span class="poll-label">🎀 50%</span>
        </div>
        <div class="poll-side poll-boy" style="width: 50%">
          <span class="poll-label">50% 🐋</span>
        </div>
        <div class="poll-marker"></div>
      </div>
    </div>

    <!-- QR: absolute right, vertically centered, hidden below 560px -->
    <a class="header-qr" id="qr-link" href="/vote" target="_blank" title="Tap to vote">
      <img class="qr-image" id="qr-img" src="" alt="Scan to vote" />
    </a>
  </header>

  <!-- MIDDLE -->
  <div class="middle">
    <div class="middle-divider"></div>
    <div class="half-girl">
      <div class="col-header">
        <span class="col-label-icon">🎀</span>
        <span class="col-label-text">Girl Names</span>
        <div class="col-vote-total"><span class="total-num" id="girl-total">0</span><span class="total-label">votes</span></div>
      </div>
      <div class="col" id="girl-col"></div>
    </div>
    <div class="half-boy">
      <div class="col-header">
        <div class="col-vote-total"><span class="total-num" id="boy-total">0</span><span class="total-label">votes</span></div>
        <span class="col-label-text">Boy Names</span>
        <span class="col-label-icon">🐋</span>
      </div>
      <div class="col" id="boy-col"></div>
    </div>
  </div>

  <!-- FOOTER: ticker, hidden on mobile -->
  <footer class="footer-band">
    <span class="ticker-label">Recent activity</span>
    <div class="ticker-wrap"><div class="ticker-inner" id="ticker"></div></div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script data-cfasync="false">
// Particles
const pCanvas=document.getElementById('particles'),pCtx=pCanvas.getContext('2d');
function resizeP(){pCanvas.width=window.innerWidth;pCanvas.height=window.innerHeight;}
resizeP();window.addEventListener('resize',resizeP);
const EMOJIS=['✨','💕','🍼','⭐','💛','🌸','💙','🌟','💗'];
function spawnP(){return{x:Math.random()*window.innerWidth,y:window.innerHeight+20,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],size:11+Math.random()*12,vx:(Math.random()-.5)*.7,vy:-(0.4+Math.random()*.7),opacity:0.1+Math.random()*.2,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.01+Math.random()*.02};}
let particles=Array.from({length:25},()=>{const p=spawnP();p.y=Math.random()*window.innerHeight;return p;});
(function animP(){pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);particles.forEach(p=>{p.y+=p.vy;p.x+=p.vx+Math.sin(p.wobble)*.3;p.wobble+=p.wobbleSpeed;if(p.y<-40)Object.assign(p,spawnP());pCtx.globalAlpha=p.opacity;pCtx.font=`${p.size}px serif`;pCtx.fillText(p.emoji,p.x,p.y);});pCtx.globalAlpha=1;requestAnimationFrame(animP);})();

// Confetti
const cCanvas=document.getElementById('confetti-canvas'),cCtx=cCanvas.getContext('2d');
function resizeC(){cCanvas.width=window.innerWidth;cCanvas.height=window.innerHeight;}
resizeC();window.addEventListener('resize',resizeC);
let confettiPieces=[];
function launchConfetti(){const colors=['#f9b8c8','#a8d4f5','#ffd700','#ff9ebc','#72c1f5','#fff','#ffd6e0','#cce8ff'];for(let i=0;i<130;i++)confettiPieces.push({x:Math.random()*cCanvas.width,y:-10,w:6+Math.random()*8,h:8+Math.random()*12,color:colors[Math.floor(Math.random()*colors.length)],vx:(Math.random()-.5)*5,vy:3+Math.random()*4,rot:Math.random()*360,rotV:(Math.random()-.5)*8,life:1});animConfetti();}
function animConfetti(){cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);confettiPieces=confettiPieces.filter(p=>p.life>.05);confettiPieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.rot+=p.rotV;p.life-=.008;cCtx.save();cCtx.globalAlpha=p.life;cCtx.translate(p.x,p.y);cCtx.rotate(p.rot*Math.PI/180);cCtx.fillStyle=p.color;cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cCtx.restore();});if(confettiPieces.length)requestAnimationFrame(animConfetti);else cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);}

let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3200);}

let prevData={girls:[],boys:[]},leaderboardCount=5;
let tickerSettings={count:20,template:'{gender_emoji} {voter} → {name}',speed:'normal'};

function applySizeForCount(n){
  const r=document.documentElement;
  if(n<=3){r.style.setProperty('--name-font','clamp(1.6rem,2.8vw,2.4rem)');r.style.setProperty('--count-font','clamp(1.9rem,3.2vw,2.8rem)');r.style.setProperty('--card-pad-v','1.3rem');r.style.setProperty('--card-gap','1.1rem');}
  else if(n<=5){r.style.setProperty('--name-font','clamp(1.35rem,2.2vw,1.85rem)');r.style.setProperty('--count-font','clamp(1.6rem,2.6vw,2.2rem)');r.style.setProperty('--card-pad-v','1rem');r.style.setProperty('--card-gap','0.85rem');}
  else if(n<=7){r.style.setProperty('--name-font','clamp(1.1rem,1.8vw,1.5rem)');r.style.setProperty('--count-font','clamp(1.3rem,2vw,1.8rem)');r.style.setProperty('--card-pad-v','0.75rem');r.style.setProperty('--card-gap','0.6rem');}
  else{r.style.setProperty('--name-font','clamp(0.95rem,1.5vw,1.3rem)');r.style.setProperty('--count-font','clamp(1.1rem,1.7vw,1.55rem)');r.style.setProperty('--card-pad-v','0.6rem');r.style.setProperty('--card-gap','0.45rem');}
}

function applyTickerSpeed(speed){
  const d={slow:'48s',normal:'32s',fast:'18s'};
  document.documentElement.style.setProperty('--ticker-duration',d[speed]||'32s');
}

function renderTickerItem(vote,template){
  const g=vote.nameGender==='girl'?'🎀':'🐋';
  return template
    .replace(/\{gender_emoji\}/g,g)
    .replace(/\{voter\}/g,`<span class="t-voter">${vote.voterName}</span>`)
    .replace(/\{name\}/g,`<span class="t-name">${vote.nameName}</span>`);
}

function renderCol(colId,names,gender,prevNames){
  const col=document.getElementById(colId);
  const topN=names.slice(0,leaderboardCount);
  const maxVotes=topN.length?Math.max(...topN.map(n=>n.votes),1):1;
  const top1=topN[0],prevTop1=prevNames[0];
  const isNewTop1=top1&&prevTop1&&top1._id!==prevTop1._id&&top1.votes>0;
  if(!topN.length){col.innerHTML=`<div class="empty-state"><div class="empty-state-icon">${gender==='girl'?'🎀':'🐋'}</div><div class="empty-state-text">No names yet — be the first!</div></div>`;return;}
  col.innerHTML=topN.map((name,i)=>{
    const rankClass=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    const rankLabel=i===0?'👑':`${i+1}`;
    return `<div class="name-card ${gender} ${rankClass}" data-id="${name._id}" style="transition-delay:${i*.07}s">
      <div class="rank-badge">${rankLabel}</div>
      <div class="name-text">${name.name}</div>
      <div class="vote-section"><div class="vote-count" id="vc-${name._id}">${name.votes}</div><div class="vote-label">votes</div></div>
      <div class="vote-bar-track"><div class="vote-bar-fill" style="width:0%"></div></div>
    </div>`;
  }).join('');
  requestAnimationFrame(()=>{
    col.querySelectorAll('.name-card').forEach(c=>requestAnimationFrame(()=>c.classList.add('visible')));
    setTimeout(()=>{topN.forEach(name=>{const pct=Math.round((name.votes/maxVotes)*100);const card=col.querySelector(`[data-id="${name._id}"]`);if(card){const bar=card.querySelector('.vote-bar-fill');if(bar)bar.style.width=pct+'%';}});},80);
  });
  if(isNewTop1){launchConfetti();showToast(`👑 ${top1.name} takes the lead!`);}
}

async function fetchAndRender(animated=false){
  const names=await(await fetch('/api/names')).json();
  const girls=names.filter(n=>n.gender==='girl').sort((a,b)=>b.votes-a.votes);
  const boys=names.filter(n=>n.gender==='boy').sort((a,b)=>b.votes-a.votes);
  let needsRerender=animated;
  if(!needsRerender){
    const pg=prevData.girls.slice(0,leaderboardCount).map(n=>n._id).join(',');
    const cg=girls.slice(0,leaderboardCount).map(n=>n._id).join(',');
    const pb=prevData.boys.slice(0,leaderboardCount).map(n=>n._id).join(',');
    const cb=boys.slice(0,leaderboardCount).map(n=>n._id).join(',');
    if(pg!==cg||pb!==cb)needsRerender=true;
  }
  if(needsRerender){renderCol('girl-col',girls,'girl',prevData.girls);renderCol('boy-col',boys,'boy',prevData.boys);}
  else{[...girls.slice(0,leaderboardCount),...boys.slice(0,leaderboardCount)].forEach(name=>{const el=document.getElementById(`vc-${name._id}`);if(!el)return;const prev=parseInt(el.textContent);if(prev!==name.votes){el.textContent=name.votes;el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),500);const card=el.closest('.name-card');if(card){const list=name.gender==='girl'?girls:boys;const max=Math.max(...list.slice(0,leaderboardCount).map(n=>n.votes),1);const bar=card.querySelector('.vote-bar-fill');if(bar)bar.style.width=Math.round((name.votes/max)*100)+'%';}}});}
  document.getElementById('girl-total').textContent=girls.reduce((s,n)=>s+n.votes,0);
  document.getElementById('boy-total').textContent=boys.reduce((s,n)=>s+n.votes,0);
  prevData={girls,boys};
}

let tickerObserver;

async function updateTicker(){
  try{
    const votes=await(await fetch(`/api/recent-votes?limit=${tickerSettings.count}`)).json();
    if(!votes.length)return;
    const tickerContainer=document.querySelector('.ticker-wrap');
    const tickerInner=document.getElementById('ticker');
    
    const itemsHTML=votes.map(v=>`<span class="ticker-item">${renderTickerItem(v,tickerSettings.template)}</span>`).join('');
    
    const renderSeamless = () => {
      // 1. Measure natural width of the content without any extra padding
      tickerInner.style.animation = 'none';
      tickerInner.innerHTML = `<div style="display:inline-flex;gap:3rem;">${itemsHTML}</div>`;
      
      const contentEl = tickerInner.children[0];
      const naturalWidth = contentEl.offsetWidth;
      const viewportWidth = tickerContainer.offsetWidth;
      
      if (!naturalWidth) return;

      let combinedHTML;
      let totalTravel;

      if (naturalWidth < viewportWidth) {
        // When content is shorter than the screen, set the padding so the total block 
        // equals EXACTLY the width of the screen. 
        // This guarantees that at the exact moment the first item begins to vanish on the left,
        // the duplicate first item begins to appear on the right.
        const gap = viewportWidth - naturalWidth;
        combinedHTML = `<div style="display:inline-flex;gap:3rem;padding-right:${gap}px">${itemsHTML}</div>`;
        tickerInner.innerHTML = combinedHTML + combinedHTML;
        totalTravel = viewportWidth; // exactly the screen width
      } else {
        // "Belt Loop" Mode: Lots of entries filling the screen.
        // We want a seamless continuous flow with only a normal gap (3rem / 48px).
        combinedHTML = `<div style="display:inline-flex;gap:3rem;padding-right:48px">${itemsHTML}</div>`;
        tickerInner.innerHTML = combinedHTML + combinedHTML;
        totalTravel = naturalWidth + 48;
      }
      
      // Speed in px/sec
      const speedMap = { slow: 40, normal: 80, fast: 150 };
      const speedPxPerSec = speedMap[tickerSettings.speed] || 80;
      const duration = totalTravel / speedPxPerSec;
      
      tickerInner.offsetHeight; // force reflow
      tickerInner.style.animation = `ticker-scroll ${duration}s linear infinite`;
    };

    renderSeamless();

    if (!tickerObserver) {
      tickerObserver = new ResizeObserver(() => renderSeamless());
      tickerObserver.observe(tickerContainer);
    }
  }catch(e){console.warn('Ticker fetch failed',e);}
}

async function loadSettings(){
  const s=await(await fetch('/api/settings')).json();
  leaderboardCount=s.leaderboardCount;
  applySizeForCount(leaderboardCount);
  tickerSettings={count:s.tickerCount||20,template:s.tickerTemplate||'{gender_emoji} {voter} → {name}',speed:s.tickerSpeed||'normal'};
  applyTickerSpeed(tickerSettings.speed);
  applyTheme(s);
}

// Theme presets
const THEME_PRESETS = {
  classic: { pageBg:'#faf8f5', cardBg:'#ffffff', accent:'#d4a853' },
  sage:    { pageBg:'#C5D1B8', cardBg:'#A8B898', accent:'#9CAF88' },
};

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function applyTheme(settings) {
  const preset = THEME_PRESETS[settings.theme];
  const colors = preset || { pageBg: settings.themePageBg, cardBg: settings.themeCardBg, accent: settings.themeAccent };
  const r = document.documentElement.style;
  r.setProperty('--theme-page-bg', colors.pageBg);
  r.setProperty('--theme-card-bg', colors.cardBg);
  r.setProperty('--theme-border', hexToRgba(colors.accent, 0.3));
}

async function loadQR(){
  const{qr,url}=await(await fetch('/api/qr')).json();
  document.getElementById('qr-img').src=qr;
  document.getElementById('qr-link').href=url;
}

async function fetchGenderVotes() {
  try {
    const res = await fetch('/api/gender-votes');
    const { boy, girl } = await res.json();
    const total = boy + girl;
    if (total === 0) {
      document.querySelector('.poll-girl').style.width = '50%';
      document.querySelector('.poll-boy').style.width = '50%';
      document.querySelector('.poll-girl .poll-label').textContent = '🎀 50%';
      document.querySelector('.poll-boy .poll-label').textContent = '50% 🐋';
      return;
    }
    const girlPct = Math.round((girl / total) * 100);
    const boyPct = 100 - girlPct;
    document.querySelector('.poll-girl').style.width = girlPct + '%';
    document.querySelector('.poll-boy').style.width = boyPct + '%';
    document.querySelector('.poll-girl .poll-label').textContent = `🎀 ${girlPct}%`;
    document.querySelector('.poll-boy .poll-label').textContent = `${boyPct}% 🐋`;
  } catch (e) {
    console.error('Failed to fetch gender votes', e);
  }
}

function connectSSE(){
  const es=new EventSource('/api/events');
  es.addEventListener('connected',()=>console.log('SSE ✓'));
  es.addEventListener('update',()=>{fetchAndRender(false);updateTicker();fetchGenderVotes();});
  es.addEventListener('settings',e=>{
    const s=JSON.parse(e.data);
    leaderboardCount=s.leaderboardCount;
    applySizeForCount(leaderboardCount);
    tickerSettings={count:s.tickerCount||20,template:s.tickerTemplate||'{gender_emoji} {voter} → {name}',speed:s.tickerSpeed||'normal'};
    applyTickerSpeed(tickerSettings.speed);
    applyTheme(s);
    fetchAndRender(true);updateTicker();fetchGenderVotes();
  });
  es.onerror=()=>{es.close();setTimeout(connectSSE,3000);};
}

(async()=>{await loadSettings();await fetchAndRender(true);await updateTicker();await fetchGenderVotes();loadQR();connectSSE();})();
</script>
