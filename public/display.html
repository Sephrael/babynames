<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Name Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink:       #f9b8c8;
    --pink-deep:  #e8849a;
    --pink-pale:  #fde8ee;
    --pink-mid:   #f4a0b8;
    --blue:       #a8d4f5;
    --blue-deep:  #6aaee0;
    --blue-pale:  #ddf0ff;
    --blue-mid:   #8ec4ef;
    --neutral:    #faf8f5;
    --neutral-border: rgba(212,168,83,0.18);
    --gold:       #d4a853;
    --text-dark:  #3a3250;

    /* Dynamic sizing — overridden by JS based on leaderboard count */
    --name-font:  clamp(1.35rem, 2.2vw, 1.85rem);
    --count-font: clamp(1.6rem, 2.6vw, 2.2rem);
    --card-pad-v: 1rem;
    --card-gap:   0.85rem;
  }

  html, body { width: 100%; height: 100%; background: var(--neutral); font-family: 'DM Sans', sans-serif; }

  /* TV: no scroll, fits exactly in viewport */
  @media (min-width: 900px) {
    body { overflow: hidden; }
  }

  /* ── Canvases ── */
  #particles      { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #confetti-canvas{ position: fixed; inset: 0; z-index: 100; pointer-events: none; }

  /* ════════════════════════════════════════════════════════
     PAGE SHELL
  ════════════════════════════════════════════════════════ */
  .page {
    position: relative; z-index: 5;
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
  }

  @media (min-width: 900px) {
    .page { height: 100vh; }
  }

  /* ════════════════════════════════════════════════════════
     HEADER BAND
  ════════════════════════════════════════════════════════ */
  .header-band {
    background: var(--neutral);
    border-bottom: 1.5px solid var(--neutral-border);
    text-align: center;
    padding: 1.4rem 3rem 1.2rem;
    position: relative;
    box-shadow: 0 2px 24px rgba(212,168,83,0.07);
  }

  /* Corner flourishes — only on large screens */
  @media (min-width: 900px) {
    .header-band::before, .header-band::after {
      content: '✦';
      position: absolute;
      top: 50%; transform: translateY(-50%);
      font-size: 1.1rem; color: var(--gold); opacity: 0.5;
    }
    .header-band::before { left: 2.5rem; }
    .header-band::after  { right: 2.5rem; }
  }

  .header-eyebrow {
    font-size: 0.7rem; font-weight: 400;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--text-dark); opacity: 0.4; margin-bottom: 0.35rem;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5.5vw, 5rem);
    font-weight: 900; color: var(--text-dark);
    line-height: 1.05; letter-spacing: -0.02em;
  }

  .header-title .accent-pink { color: var(--pink-deep); }
  .header-title .accent-blue { color: var(--blue-deep); }

  .header-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.9rem, 1.5vw, 1.35rem);
    font-weight: 300; font-style: italic;
    color: var(--text-dark); opacity: 0.4; margin-top: 0.25rem;
  }

  /* ════════════════════════════════════════════════════════
     MIDDLE — pink/blue split
  ════════════════════════════════════════════════════════ */
  .middle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  /* On mobile, stack vertically */
  @media (max-width: 600px) {
    .middle { grid-template-columns: 1fr; }
  }

  .half-girl { background: var(--pink-pale); display: flex; flex-direction: column; min-height: 0; }
  .half-boy  { background: var(--blue-pale); display: flex; flex-direction: column; min-height: 0; }

  /* Gold center divider — hidden on mobile */
  .middle-divider {
    position: absolute; left: 50%; top: 0; bottom: 0;
    width: 3px; transform: translateX(-50%);
    background: linear-gradient(to bottom, transparent 0%, var(--gold) 8%, var(--gold) 92%, transparent 100%);
    z-index: 10; pointer-events: none;
  }
  .middle-divider::before, .middle-divider::after {
    content: '◆'; position: absolute; left: 50%; transform: translateX(-50%);
    color: var(--gold); font-size: 0.9rem; line-height: 1;
  }
  .middle-divider::before { top: 6%; }
  .middle-divider::after  { bottom: 6%; }

  @media (max-width: 600px) { .middle-divider { display: none; } }

  /* ── Column labels ── */
  .col-label {
    display: flex; align-items: center; justify-content: center;
    gap: 0.6rem; padding: 0.8rem 1.5rem 0.6rem; flex-shrink: 0;
  }
  .col-label-icon { font-size: clamp(1.2rem, 2vw, 1.8rem); }
  .col-label-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 2.4vw, 2.2rem);
    font-weight: 700; font-style: italic;
  }
  .half-girl .col-label-text { color: var(--pink-deep); }
  .half-boy  .col-label-text { color: var(--blue-deep); }

  /* ── Leaderboard col ── */
  .col {
    flex: 1;
    padding: 0.2rem clamp(1rem, 2.5vw, 2.5rem) 1.2rem;
    display: flex; flex-direction: column;
    gap: var(--card-gap);
    overflow: hidden; min-height: 0;
  }

  /* On mobile, don't constrain height */
  @media (max-width: 899px) {
    .col { overflow: visible; min-height: unset; padding-bottom: 1rem; }
  }

  /* ── Name card ── */
  .name-card {
    display: flex; align-items: center;
    gap: clamp(0.7rem, 1.2vw, 1.1rem);
    padding: var(--card-pad-v) clamp(0.8rem, 1.4vw, 1.4rem);
    border-radius: clamp(12px, 1.5vw, 18px);
    position: relative; overflow: hidden;
    opacity: 0; transform: translateY(24px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    will-change: transform, opacity; flex-shrink: 0;
  }
  .name-card.visible { opacity: 1; transform: translateY(0); }

  .name-card.girl {
    background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(249,184,200,0.32));
    border: 1.5px solid rgba(232,132,154,0.22);
    box-shadow: 0 4px 20px rgba(232,132,154,0.1), 0 1px 4px rgba(0,0,0,0.05);
  }
  .name-card.boy {
    background: linear-gradient(135deg, rgba(255,255,255,0.88), rgba(168,212,245,0.32));
    border: 1.5px solid rgba(106,174,224,0.22);
    box-shadow: 0 4px 20px rgba(106,174,224,0.1), 0 1px 4px rgba(0,0,0,0.05);
  }
  .name-card.rank-1::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.42), transparent);
    animation: shimmer 3s ease-in-out infinite; pointer-events: none;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 60%{transform:translateX(100%)} 100%{transform:translateX(100%)} }

  .rank-badge {
    font-family: 'Playfair Display', serif; font-weight: 900;
    width: clamp(1.8rem, 2.4vw, 2.4rem); height: clamp(1.8rem, 2.4vw, 2.4rem);
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; flex-shrink: 0; font-size: clamp(0.75rem, 1vw, 1rem);
  }
  .name-card.rank-1 .rank-badge { background: linear-gradient(135deg,#f7e06b,#d4a853); color:#5a3e00; }
  .name-card.rank-2 .rank-badge { background: linear-gradient(135deg,#e8e8e8,#b0b0b0); color:#3a3a3a; }
  .name-card.rank-3 .rank-badge { background: linear-gradient(135deg,#f5c89a,#c87941); color:#5a2e00; }
  .name-card:not(.rank-1):not(.rank-2):not(.rank-3) .rank-badge { background: rgba(255,255,255,0.5); color: var(--text-dark); opacity:0.45; }

  .crown {
    position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
    font-size: clamp(0.9rem, 1.4vw, 1.2rem);
    animation: crown-bob 2s ease-in-out infinite; pointer-events: none;
  }
  @keyframes crown-bob {
    0%,100%{transform:translateX(-50%) translateY(0) rotate(-5deg)}
    50%{transform:translateX(-50%) translateY(-4px) rotate(5deg)}
  }

  .name-text {
    flex: 1; font-family: 'Playfair Display', serif;
    font-size: var(--name-font); font-weight: 700;
    color: var(--text-dark); letter-spacing: 0.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .vote-section { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem; flex-shrink: 0; }

  .vote-count {
    font-family: 'Playfair Display', serif;
    font-size: var(--count-font); font-weight: 900; line-height: 1;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), color 0.3s;
  }
  .name-card.girl .vote-count { color: var(--pink-deep); }
  .name-card.boy  .vote-count { color: var(--blue-deep); }
  .vote-count.pop { transform: scale(1.4); color: var(--gold) !important; }

  .vote-label { font-size: clamp(0.5rem, 0.65vw, 0.62rem); font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.45; color: var(--text-dark); }

  .vote-bar-track { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; border-radius: 0 0 18px 18px; background: rgba(0,0,0,0.05); overflow: hidden; }
  .vote-bar-fill  { height: 100%; border-radius: 0 0 18px 18px; transition: width 0.8s cubic-bezier(0.25,1,0.5,1); }
  .name-card.girl .vote-bar-fill { background: linear-gradient(to right, var(--pink-mid), var(--pink-deep)); }
  .name-card.boy  .vote-bar-fill { background: linear-gradient(to right, var(--blue-mid), var(--blue-deep)); }

  .empty-state { text-align: center; opacity: 0.3; padding: 2rem 1rem; }
  .empty-state-icon { font-size: clamp(1.8rem, 3vw, 2.5rem); margin-bottom: 0.5rem; }
  .empty-state-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(0.9rem, 1.4vw, 1.2rem); color: var(--text-dark); }

  /* ════════════════════════════════════════════════════════
     FOOTER BAND
  ════════════════════════════════════════════════════════ */
  .footer-band {
    background: var(--neutral);
    border-top: 1.5px solid var(--neutral-border);
    box-shadow: 0 -2px 24px rgba(212,168,83,0.07);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0.8rem clamp(1rem, 3vw, 3rem);
    gap: 1.5rem;
  }

  /* Mobile footer: stack vertically */
  @media (max-width: 700px) {
    .footer-band {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      gap: 0.8rem;
      padding: 1rem;
    }
    .footer-stats { justify-content: center; }
    .footer-ticker-wrap { display: none; } /* hide ticker on small screens */
  }

  .footer-stats { display: flex; gap: 0.8rem; align-items: center; }

  .stat-pill {
    display: flex; align-items: center; gap: 0.4rem;
    background: white; border: 1px solid var(--neutral-border);
    border-radius: 50px; padding: 0.35rem 0.9rem;
    font-size: clamp(0.7rem, 1vw, 0.85rem); font-weight: 500;
    color: var(--text-dark); box-shadow: 0 1px 6px rgba(0,0,0,0.04);
  }
  .stat-pill .stat-num { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(0.85rem, 1.1vw, 1rem); }
  .stat-pill.pink .stat-num { color: var(--pink-deep); }
  .stat-pill.blue .stat-num { color: var(--blue-deep); }

  .qr-block {
    display: flex; align-items: center; gap: 1rem;
    background: white; border: 1.5px solid var(--neutral-border);
    border-radius: 16px; padding: clamp(0.6rem,1vw,0.85rem) clamp(0.8rem,1.5vw,1.5rem);
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .qr-image { width: clamp(64px,8vw,90px); height: clamp(64px,8vw,90px); border-radius: 8px; background: white; padding: 4px; flex-shrink: 0; }
  .qr-cta { font-family: 'Playfair Display', serif; font-size: clamp(0.9rem,1.3vw,1.15rem); font-weight: 700; color: var(--text-dark); line-height: 1.25; white-space: nowrap; }
  .qr-url { font-size: clamp(0.65rem,0.85vw,0.78rem); font-weight: 300; color: var(--text-dark); opacity: 0.45; margin-top: 0.15rem; }
  .qr-icons { margin-top: 0.3rem; font-size: clamp(0.75rem,1vw,1rem); letter-spacing: 0.1em; }

  .footer-ticker-wrap { overflow: hidden; justify-self: stretch; }
  .footer-ticker-label { font-size: 0.62rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dark); opacity: 0.32; margin-bottom: 0.2rem; }
  .ticker-inner { display: flex; white-space: nowrap; gap: 2.5rem; animation: ticker-scroll 28s linear infinite; }
  .ticker-item { font-size: clamp(0.72rem, 0.9vw, 0.82rem); font-weight: 500; color: var(--text-dark); opacity: 0.6; display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
  @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: clamp(1rem,5vw,7rem); left: 50%;
    transform: translateX(-50%) translateY(3rem);
    background: white; border-radius: 50px;
    padding: 0.7rem 1.8rem; font-size: 0.9rem; font-weight: 600;
    color: var(--text-dark); box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    z-index: 200; opacity: 0;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
    pointer-events: none; white-space: nowrap;
    border: 1px solid var(--neutral-border);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="page">

  <!-- HEADER -->
  <header class="header-band">
    <div class="header-eyebrow">Scan the QR code &nbsp;·&nbsp; Suggest a name &nbsp;·&nbsp; Cast your vote</div>
    <h1 class="header-title">
      Vote for <span class="accent-pink">Baby</span>'s <span class="accent-blue">Name</span>
    </h1>
    <p class="header-sub">Every vote counts — let the best name win ✨</p>
  </header>

  <!-- MIDDLE: split -->
  <div class="middle">
    <div class="middle-divider"></div>

    <div class="half-girl">
      <div class="col-label">
        <span class="col-label-icon">🎀</span>
        <span class="col-label-text">Girl Names</span>
      </div>
      <div class="col" id="girl-col"></div>
    </div>

    <div class="half-boy">
      <div class="col-label">
        <span class="col-label-text">Boy Names</span>
        <span class="col-label-icon">🐋</span>
      </div>
      <div class="col" id="boy-col"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer-band">
    <div class="footer-stats">
      <div class="stat-pill pink">
        <span>🎀</span><span class="stat-num" id="girl-total">0</span><span>girl votes</span>
      </div>
      <div class="stat-pill blue">
        <span>🐋</span><span class="stat-num" id="boy-total">0</span><span>boy votes</span>
      </div>
    </div>

    <div class="qr-block">
      <img class="qr-image" id="qr-img" src="" alt="QR Code" />
      <div>
        <div class="qr-cta">Scan to vote or suggest<br>a name!</div>
        <div class="qr-url" id="qr-url">Loading…</div>
        <div class="qr-icons">✨ 💕 🍼 💙</div>
      </div>
    </div>

    <div class="footer-ticker-wrap">
      <div class="footer-ticker-label">Recent votes</div>
      <div class="ticker-inner" id="ticker"></div>
    </div>
  </footer>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── Particles ────────────────────────────────────────────────────────────────
const pCanvas = document.getElementById('particles'), pCtx = pCanvas.getContext('2d');
function resizeP() { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; }
resizeP(); window.addEventListener('resize', resizeP);
const EMOJIS = ['✨','💕','🍼','⭐','💛','🌸','💙','🌟','💗'];
function spawnP() {
  return { x: Math.random()*window.innerWidth, y: window.innerHeight+20,
    emoji: EMOJIS[Math.floor(Math.random()*EMOJIS.length)],
    size: 11+Math.random()*12, vx: (Math.random()-.5)*.7, vy: -(0.4+Math.random()*.7),
    opacity: 0.1+Math.random()*.2, wobble: Math.random()*Math.PI*2, wobbleSpeed: 0.01+Math.random()*.02 };
}
let particles = Array.from({length:25}, () => { const p=spawnP(); p.y=Math.random()*window.innerHeight; return p; });
(function animP() {
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles.forEach(p => {
    p.y+=p.vy; p.x+=p.vx+Math.sin(p.wobble)*.3; p.wobble+=p.wobbleSpeed;
    if (p.y<-40) Object.assign(p,spawnP());
    pCtx.globalAlpha=p.opacity; pCtx.font=`${p.size}px serif`; pCtx.fillText(p.emoji,p.x,p.y);
  });
  pCtx.globalAlpha=1; requestAnimationFrame(animP);
})();

// ─── Confetti ─────────────────────────────────────────────────────────────────
const cCanvas = document.getElementById('confetti-canvas'), cCtx = cCanvas.getContext('2d');
function resizeC() { cCanvas.width=window.innerWidth; cCanvas.height=window.innerHeight; }
resizeC(); window.addEventListener('resize', resizeC);
let confettiPieces = [];
function launchConfetti() {
  const colors = ['#f9b8c8','#a8d4f5','#ffd700','#ff9ebc','#72c1f5','#fff','#ffd6e0','#cce8ff'];
  for (let i=0;i<130;i++) confettiPieces.push({
    x:Math.random()*cCanvas.width, y:-10, w:6+Math.random()*8, h:8+Math.random()*12,
    color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-.5)*5, vy:3+Math.random()*4, rot:Math.random()*360,
    rotV:(Math.random()-.5)*8, life:1
  });
  animConfetti();
}
function animConfetti() {
  cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
  confettiPieces = confettiPieces.filter(p=>p.life>.05);
  confettiPieces.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=.12; p.rot+=p.rotV; p.life-=.008;
    cCtx.save(); cCtx.globalAlpha=p.life; cCtx.translate(p.x,p.y); cCtx.rotate(p.rot*Math.PI/180);
    cCtx.fillStyle=p.color; cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cCtx.restore();
  });
  if (confettiPieces.length) requestAnimationFrame(animConfetti);
  else cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

// ─── Dynamic sizing based on leaderboard count ────────────────────────────────
function applySizeForCount(n) {
  const root = document.documentElement;
  // Scale down fonts and padding as more items need to fit
  if (n <= 3) {
    root.style.setProperty('--name-font',  'clamp(1.6rem, 2.8vw, 2.4rem)');
    root.style.setProperty('--count-font', 'clamp(1.9rem, 3.2vw, 2.8rem)');
    root.style.setProperty('--card-pad-v', '1.3rem');
    root.style.setProperty('--card-gap',   '1.1rem');
  } else if (n <= 5) {
    root.style.setProperty('--name-font',  'clamp(1.35rem, 2.2vw, 1.85rem)');
    root.style.setProperty('--count-font', 'clamp(1.6rem, 2.6vw, 2.2rem)');
    root.style.setProperty('--card-pad-v', '1rem');
    root.style.setProperty('--card-gap',   '0.85rem');
  } else if (n <= 7) {
    root.style.setProperty('--name-font',  'clamp(1.1rem, 1.8vw, 1.5rem)');
    root.style.setProperty('--count-font', 'clamp(1.3rem, 2vw, 1.8rem)');
    root.style.setProperty('--card-pad-v', '0.75rem');
    root.style.setProperty('--card-gap',   '0.6rem');
  } else {
    root.style.setProperty('--name-font',  'clamp(0.95rem, 1.5vw, 1.3rem)');
    root.style.setProperty('--count-font', 'clamp(1.1rem, 1.7vw, 1.55rem)');
    root.style.setProperty('--card-pad-v', '0.6rem');
    root.style.setProperty('--card-gap',   '0.45rem');
  }
}

// ─── State ────────────────────────────────────────────────────────────────────
let prevData = { girls: [], boys: [] };
let leaderboardCount = 5;

// ─── Render column ────────────────────────────────────────────────────────────
function renderCol(colId, names, gender, prevNames) {
  const col = document.getElementById(colId);
  const topN = names.slice(0, leaderboardCount);
  const maxVotes = topN.length ? Math.max(...topN.map(n=>n.votes), 1) : 1;

  const top1 = topN[0], prevTop1 = prevNames[0];
  const isNewTop1 = top1 && prevTop1 && top1._id !== prevTop1._id && top1.votes > 0;

  if (!topN.length) {
    col.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">${gender==='girl'?'🎀':'🐋'}</div>
      <div class="empty-state-text">No names yet — be the first!</div>
    </div>`;
    return;
  }

  col.innerHTML = topN.map((name, i) => {
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
    const rankLabel = i===0?'👑':`${i+1}`;
    return `<div class="name-card ${gender} ${rankClass}" data-id="${name._id}" style="transition-delay:${i*.07}s">
      ${i===0?'<div class="crown">👑</div>':''}
      <div class="rank-badge">${rankLabel}</div>
      <div class="name-text">${name.name}</div>
      <div class="vote-section">
        <div class="vote-count" id="vc-${name._id}">${name.votes}</div>
        <div class="vote-label">votes</div>
      </div>
      <div class="vote-bar-track"><div class="vote-bar-fill" style="width:0%"></div></div>
    </div>`;
  }).join('');

  requestAnimationFrame(() => {
    col.querySelectorAll('.name-card').forEach(c => requestAnimationFrame(() => c.classList.add('visible')));
    setTimeout(() => {
      topN.forEach(name => {
        const pct = Math.round((name.votes/maxVotes)*100);
        const card = col.querySelector(`[data-id="${name._id}"]`);
        if (card) { const bar = card.querySelector('.vote-bar-fill'); if (bar) bar.style.width = pct+'%'; }
      });
    }, 80);
  });

  if (isNewTop1) { launchConfetti(); showToast(`👑 ${top1.name} takes the lead!`); }
}

// ─── Fetch and render ─────────────────────────────────────────────────────────
async function fetchAndRender(animated = false) {
  const res = await fetch('/api/names');
  const names = await res.json();
  const girls = names.filter(n=>n.gender==='girl').sort((a,b)=>b.votes-a.votes);
  const boys  = names.filter(n=>n.gender==='boy' ).sort((a,b)=>b.votes-a.votes);

  let needsRerender = animated;
  if (!needsRerender) {
    const pg = prevData.girls.slice(0,leaderboardCount).map(n=>n._id).join(',');
    const cg = girls.slice(0,leaderboardCount).map(n=>n._id).join(',');
    const pb = prevData.boys.slice(0,leaderboardCount).map(n=>n._id).join(',');
    const cb = boys.slice(0,leaderboardCount).map(n=>n._id).join(',');
    if (pg!==cg || pb!==cb) needsRerender = true;
  }

  if (needsRerender) {
    renderCol('girl-col', girls, 'girl', prevData.girls);
    renderCol('boy-col',  boys,  'boy',  prevData.boys);
  } else {
    [...girls.slice(0,leaderboardCount), ...boys.slice(0,leaderboardCount)].forEach(name => {
      const el = document.getElementById(`vc-${name._id}`);
      if (!el) return;
      const prev = parseInt(el.textContent);
      if (prev !== name.votes) {
        el.textContent = name.votes;
        el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
        setTimeout(() => el.classList.remove('pop'), 500);
        const card = el.closest('.name-card');
        if (card) {
          const list = name.gender==='girl'?girls:boys;
          const max  = Math.max(...list.slice(0,leaderboardCount).map(n=>n.votes),1);
          const bar  = card.querySelector('.vote-bar-fill');
          if (bar) bar.style.width = Math.round((name.votes/max)*100)+'%';
        }
      }
    });
  }

  document.getElementById('girl-total').textContent = girls.reduce((s,n)=>s+n.votes,0);
  document.getElementById('boy-total').textContent  = boys.reduce((s,n)=>s+n.votes,0);
  prevData = { girls, boys };
  updateTicker(names);
}

function updateTicker(names) {
  const items = names.filter(n=>n.votes>0).sort((a,b)=>b.votes-a.votes).slice(0,14)
    .map(n=>`<span class="ticker-item">${n.gender==='girl'?'🎀':'🐋'} <strong>${n.name}</strong> — ${n.votes} vote${n.votes!==1?'s':''}</span>`)
    .join('');
  const ticker = document.getElementById('ticker');
  if (items) ticker.innerHTML = items + items;
}

async function loadQR() {
  const { qr, url } = await (await fetch('/api/qr')).json();
  document.getElementById('qr-img').src = qr;
  document.getElementById('qr-url').textContent = url;
}

async function loadSettings() {
  const s = await (await fetch('/api/settings')).json();
  leaderboardCount = s.leaderboardCount;
  applySizeForCount(leaderboardCount);
}

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connectSSE() {
  const es = new EventSource('/api/events');
  es.addEventListener('connected', () => console.log('SSE ✓'));
  es.addEventListener('update', () => fetchAndRender(false));
  es.addEventListener('settings', e => {
    const s = JSON.parse(e.data);
    leaderboardCount = s.leaderboardCount;
    applySizeForCount(leaderboardCount);
    fetchAndRender(true); // re-render with new count
  });
  es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); };
}

// ─── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  await loadSettings();
  fetchAndRender(true);
  loadQR();
  connectSSE();
})();
</script>
